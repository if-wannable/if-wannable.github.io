<script>
const GIST_CONFIG = {
  gistId: 'b153fed7b323ef2c10c230f12bd67142',
  token: localStorage.getItem('github_token') || '',
  filename: 'tasks.json'
};

const DEFAULT_TASKS = {
  card: [{ id: 'card-1', text: '签到打卡' }, { id: 'card-2', text: '盖楼回复' }],
  bump: [
    { id: 'bump-1', text: '点击顶帖', link: 'https://www.douban.com/group/topic/486670265/?_spm_id=MTk4OTA4NTUw&dt_dapp=1&dt_platform=com.douban.activity.wechat_friends&_i=8212575DYOxO7j,8212578DYOxO7j' },
    { id: 'bump-2', text: '待添加' },
    { id: 'bump-3', text: '待添加' }
  ],
  home: [{ id: 'home-1', text: '访问个人主页' }, { id: 'home-2', text: '查看最新动态' }],
  other: [{ id: 'other-1', text: '微博超话签到' }, { id: 'other-2', text: '转发微博' }, { id: 'other-3', text: '播放音乐' }]
};

let TASKS_CONFIG = DEFAULT_TASKS;
const ADMIN_PASSWORD = '123456';
let isAdminUnlocked = false;
let batchDeleteMode = false;

// 初始化
document.getElementById('today-date').innerText = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

function updateCloudStatus(message, isError) {
  const status = document.getElementById('cloud-status');
  if (status) {
    status.innerText = message;
    status.style.color = isError ? '#e74c3c' : '#7eb86e';
  }
}

function formatTimeAgo(timestamp) {
  if (!timestamp) return '';
  const minutes = Math.floor((Date.now() - parseInt(timestamp)) / 60000);
  if (minutes < 1) return '刚刚';
  if (minutes < 60) return `${minutes}分钟前`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}小时前`;
  return `${Math.floor(hours / 24)}天前`;
}

function loadTasksFromCache() {
  const cached = localStorage.getItem('tasks_cache');
  if (cached) {
    try {
      TASKS_CONFIG = JSON.parse(cached);
      updateCloudStatus(`💾 使用本地缓存 (${formatTimeAgo(localStorage.getItem('tasks_cache_time'))})`, false);
      return true;
    } catch(e) {}
  }
  return false;
}

function loadTasksFromGist(forceRefresh, callback) {
  if (!forceRefresh && loadTasksFromCache()) {
    callback && callback(TASKS_CONFIG);
    return;
  }
  if (!GIST_CONFIG.gistId) {
    updateCloudStatus('⚠️ 未配置云端同步', true);
    callback && callback(null);
    return;
  }

  const progress = document.getElementById('sync-progress');
  progress.style.display = 'inline';

  const timeout = setTimeout(() => {
    progress.style.display = 'none';
    if (loadTasksFromCache()) {
      updateCloudStatus('⏱️ 加载超时，使用本地缓存', false);
    } else {
      updateCloudStatus('⏱️ 加载超时，使用默认任务', true);
    }
    callback && callback(TASKS_CONFIG);
  }, 5000);

  const headers = GIST_CONFIG.token ? { 'Authorization': `token ${GIST_CONFIG.token}` } : {};
  fetch(`https://api.github.com/gists/${GIST_CONFIG.gistId}?_=${Date.now()}`, { cache: 'no-cache', headers })
    .then(res => res.json())
    .then(data => {
      clearTimeout(timeout);
      progress.style.display = 'none';
      if (data.message?.includes('rate limit')) {
        if (loadTasksFromCache()) {
          updateCloudStatus('⚠️ API 限流，使用本地缓存', false);
        } else {
          updateCloudStatus('⚠️ API 限流，点击手动刷新重试', true);
        }
        callback && callback(null);
        return;
      }
      if (data.files?.[GIST_CONFIG.filename]) {
        try {
          TASKS_CONFIG = JSON.parse(data.files[GIST_CONFIG.filename].content);
          localStorage.setItem('tasks_cache', JSON.stringify(TASKS_CONFIG));
          localStorage.setItem('tasks_cache_time', Date.now());
          updateCloudStatus('☁️ 已从云端加载', false);
          callback && callback(TASKS_CONFIG);
        } catch(e) {
          updateCloudStatus('⚠️ 云端数据格式错误', true);
          callback && callback(null);
        }
      } else {
        updateCloudStatus('⚠️ Gist 中无 tasks.json，请先点击同步', true);
        callback && callback(null);
      }
    })
    .catch(() => {
      clearTimeout(timeout);
      progress.style.display = 'none';
      if (loadTasksFromCache()) {
        updateCloudStatus('⚠️ 网络错误，使用本地缓存', false);
      } else {
        updateCloudStatus('⚠️ 加载失败，点击手动刷新重试', true);
      }
      callback && callback(null);
    });
}

function saveTasksToGist(callback) {
  if (!GIST_CONFIG.gistId || !GIST_CONFIG.token) {
    const token = prompt('同步到云端需要 GitHub Token，请输入：\n\n（Token 将保存在本机 localStorage 中，不会上传）');
    if (token?.trim()) {
      GIST_CONFIG.token = token.trim();
      localStorage.setItem('github_token', GIST_CONFIG.token);
    } else {
      alert('❌ 未提供 Token，无法同步到云端。');
      callback && callback(false);
      return;
    }
  }

  const content = { [GIST_CONFIG.filename]: { content: JSON.stringify(TASKS_CONFIG, null, 2) } };
  fetch(`https://api.github.com/gists/${GIST_CONFIG.gistId}`, {
    method: 'PATCH',
    headers: { 'Authorization': `token ${GIST_CONFIG.token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: content })
  })
  .then(res => {
    if (res.ok) {
      localStorage.setItem('tasks_cache', JSON.stringify(TASKS_CONFIG));
      localStorage.setItem('tasks_cache_time', Date.now());
      updateCloudStatus('✅ 已同步到云端', false);
      callback && callback(true);
    } else {
      res.text().then(text => alert(`❌ 同步失败！HTTP ${res.status}\n\n${text || ''}`));
      callback && callback(false);
    }
  })
  .catch(err => {
    alert(`❌ 同步失败！网络错误: ${err.message || ''}`);
    callback && callback(false);
  });
}

function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, '<a href="$1" target="_blank" style="color:inherit;text-decoration:none;cursor:text;word-break:break-all;" onclick="event.stopPropagation();if(isAdminUnlocked)return false;">$1</a>');
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = e => {
    const img = new Image();
    img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width, height = img.height;
      const maxSize = 1000;
      if (width > height && width > maxSize) {
        height = (height * maxSize) / width;
        width = maxSize;
      } else if (height > maxSize) {
        width = (width * maxSize) / height;
        height = maxSize;
      }
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    };
  };
}

function renderTasks() {
  ['card', 'bump', 'home', 'other'].forEach(section => {
    const container = document.getElementById(`${section}-tasks`);
    container.innerHTML = '';
    (TASKS_CONFIG[section] || []).forEach((task, index) => {
      const isChecked = localStorage.getItem(task.id) === 'true';
      const hasLink = !!task.link;
      const taskClass = `task-item${hasLink ? ' has-link' : ''}`;
      const textClass = `task-text${hasLink ? ' has-link' : ''}${isChecked && !isAdminUnlocked ? ' checked' : ''}`;
      const images = task.images || [];

      let html = `<div class="${taskClass}" data-link="${task.link || ''}">
        <div class="task-item-inner">
          <span class="task-num">${String(index + 1).padStart(2, '0')}</span>
          <span class="${textClass}" data-id="${task.id}" data-section="${section}">${linkify(task.text)}${isAdminUnlocked ? '<span class=\'edit-btn-small\' style=\'margin-left:6px;\' data-id=\''+task.id+'\' data-section=\''+section+'\'>✏️</span>' : ''}</span>`;

      if (hasLink) {
        html += `<span class="jump-btn" data-link="${task.link}">🔗 跳转</span>
          <span class="edit-link-btn" data-id="${task.id}" data-section="${section}">✏️</span>`;
      }

      html += `<span class="delete-btn" data-id="${task.id}" data-section="${section}">🗑️</span>
        <input type="checkbox" class="task-checkbox" data-id="${task.id}" style="display:${!isAdminUnlocked || batchDeleteMode ? 'inline' : 'none'}" ${isChecked ? 'checked' : ''}>`;

      if (isAdminUnlocked) {
        html += `<label class="add-img-btn-small" title="上传图片">📷<input type="file" accept="image/*" style="display:none" data-task-id="${task.id}" data-section="${section}"></label>`;
      }

      html += `</div>`;

      if (images.length > 0) {
        html += `<div class="task-images-row">`;
        images.forEach((img, idx) => {
          html += `<div class="task-thumb-wrap">
            <img src="${img}" class="task-thumb" onclick="event.stopPropagation();openImagePreview('${img.replace(/'/g, "\\'")}')">`;
          if (isAdminUnlocked) {
            html += `<span class="img-delete-btn" data-task-id="${task.id}" data-section="${section}" data-img-idx="${idx}">×</span>`;
          }
          html += `</div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
      container.insertAdjacentHTML('beforeend', html);
    });
  });
}

function updateAdminStatus() {
  const isDisplay = isAdminUnlocked ? 'inline' : 'none';
  const notDisplay = isAdminUnlocked ? 'none' : 'inline-block';

  document.getElementById('admin-btn').innerText = isAdminUnlocked ? '🔓 锁定编辑' : '🔒 解锁编辑';
  document.getElementById('admin-status').style.display = isAdminUnlocked ? 'inline' : 'none';
  document.getElementById('sync-btn').style.display = 'none';
  document.getElementById('batch-delete-btn').style.display = isAdminUnlocked ? 'inline' : 'none';

  document.querySelectorAll('.delete-btn, .edit-link-btn').forEach(b => b.style.display = isDisplay);
  document.querySelectorAll('.add-task-btn').forEach(b => b.style.display = isAdminUnlocked ? 'block' : 'none');
  document.querySelectorAll('.jump-btn').forEach(b => b.style.display = notDisplay);
  document.querySelectorAll('.add-img-btn-small').forEach(b => b.style.display = isAdminUnlocked ? 'flex' : 'none');

  document.querySelectorAll('.task-text a').forEach(a => {
    if (isAdminUnlocked) {
      a.style.color = 'inherit';
      a.style.textDecoration = 'none';
      a.style.cursor = 'text';
    } else {
      a.style.color = '#2196f3';
      a.style.textDecoration = 'underline';
      a.style.cursor = 'pointer';
    }
  });
}

function openLink(link) {
  if (link) window.open(link, '_blank');
}

function bindAllEvents() {
  document.querySelectorAll('.task-checkbox').forEach(checkbox => {
    checkbox.onclick = e => e.stopPropagation();
    checkbox.onchange = function(e) {
      e.stopPropagation();
      const taskId = this.dataset.id;
      localStorage.setItem(taskId, this.checked);
      const textEl = document.querySelector(`.task-text[data-id="${taskId}"]`);
      if (textEl && !isAdminUnlocked) this.checked ? textEl.classList.add('checked') : textEl.classList.remove('checked');
    };
  });

  document.querySelectorAll('.jump-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      openLink(btn.dataset.link);
    };
  });

  document.querySelectorAll('.task-item.has-link').forEach(item => {
    item.onclick = () => {
      if (!isAdminUnlocked) openLink(item.dataset.link);
    };
  });

  function editTask(section, id) {
    const task = TASKS_CONFIG[section].find(t => t.id === id);
    const newText = prompt('编辑任务内容：\n\n编辑后将自动同步，其他人刷新就能看到变化。', task.text);
    if (newText?.trim()) {
      task.text = newText.trim();
      refresh();
    }
  }

  document.querySelectorAll('.edit-btn-small').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      editTask(this.dataset.section, this.dataset.id);
    };
  });

  document.querySelectorAll('.task-text').forEach(taskText => {
    taskText.onclick = function(e) {
      e.stopPropagation();
      if (!isAdminUnlocked) {
        openLink(this.dataset.link);
        return;
      }
      editTask(this.dataset.section, this.dataset.id);
    };
  });

  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      if (!isAdminUnlocked || !confirm('确定要删除这个任务吗？')) return;
      TASKS_CONFIG[this.dataset.section] = TASKS_CONFIG[this.dataset.section].filter(t => t.id !== this.dataset.id);
      localStorage.removeItem(this.dataset.id);
      refresh();
    };
  });

  document.querySelectorAll('.edit-link-btn').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      if (!isAdminUnlocked) return alert('请先解锁编辑模式');
      const task = TASKS_CONFIG[this.dataset.section].find(t => t.id === this.dataset.id);
      const newLink = prompt('编辑链接地址：', task.link || '');
      if (newLink !== null) {
        task.link = newLink.trim() || undefined;
        const newText = prompt('编辑链接文字：', task.text);
        if (newText?.trim()) task.text = newText.trim();
        refresh();
      }
    };
  });

  document.querySelectorAll('input[type="file"][data-task-id]').forEach(input => {
    input.onchange = function(e) {
      e.stopPropagation();
      const file = this.files[0];
      if (!file) return;
      const task = TASKS_CONFIG[this.dataset.section].find(t => t.id === this.dataset.taskId);
      compressImage(file, dataUrl => {
        if (!task.images) task.images = [];
        task.images.push(dataUrl);
        refresh();
      });
    };
  });

  document.querySelectorAll('.img-delete-btn').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      if (!isAdminUnlocked || !confirm('确定删除这张图片？')) return;
      const task = TASKS_CONFIG[this.dataset.section].find(t => t.id === this.dataset.taskId);
      if (task.images) {
        task.images.splice(parseInt(this.dataset.imgIdx), 1);
        refresh();
      }
    };
  });

  updateAdminStatus();
}

function refresh(autoSync = true) {
  renderTasks();
  bindAllEvents();
  if (autoSync && isAdminUnlocked) {
    saveTasksToGist();
  }
}

// 事件绑定
document.getElementById('admin-btn').onclick = function() {
  if (isAdminUnlocked) {
    isAdminUnlocked = false;
    refresh();
    return;
  }
  if (localStorage.getItem('admin_unlocked_once') === 'true') {
    isAdminUnlocked = true;
    refresh();
    return;
  }
  const pwd = prompt('请输入管理员密码：');
  if (pwd === ADMIN_PASSWORD) {
    isAdminUnlocked = true;
    localStorage.setItem('admin_unlocked_once', 'true');
    refresh();
    if (!GIST_CONFIG.token) {
      const token = prompt('检测到未配置 GitHub Token。\n\n请输入 GitHub Personal Access Token：');
      if (token?.trim()) {
        GIST_CONFIG.token = token.trim();
        localStorage.setItem('github_token', GIST_CONFIG.token);
      }
    }
  } else if (pwd !== null) {
    alert('密码错误！');
  }
};

document.querySelectorAll('.add-task-btn').forEach(btn => {
  btn.onclick = function() {
    if (!isAdminUnlocked) return;
    const section = this.closest('.module-card').dataset.section;
    const text = prompt('请输入新任务内容：', '新任务');
    if (text?.trim()) {
      TASKS_CONFIG[section].push({ id: `${section}-${Date.now()}`, text: text.trim() });
      refresh();
    }
  };
});

function updateBatchDeleteButton() {
  const btn = document.getElementById('batch-delete-btn');
  const checkedCount = document.querySelectorAll('.task-checkbox:checked').length;
  btn.innerText = checkedCount > 0 ? '✅ 确认删除' : '↩️ 返回';
}

document.getElementById('batch-delete-btn').onclick = function() {
  if (!isAdminUnlocked) return;

  if (!batchDeleteMode) {
    batchDeleteMode = true;
    this.innerText = '↩️ 返回';
    document.querySelectorAll('.task-checkbox').forEach(cb => {
      cb.style.display = 'inline';
      const originalOnChange = cb.onchange;
      cb.onchange = function(e) {
        if (originalOnChange) originalOnChange.call(this, e);
        updateBatchDeleteButton();
      };
    });
    document.querySelectorAll('.delete-btn, .edit-btn-small').forEach(b => b.style.display = 'none');
    document.querySelectorAll('.add-img-btn-small').forEach(b => b.style.display = 'none');
    return;
  }

  const checkedIds = [];
  document.querySelectorAll('.task-checkbox:checked').forEach(cb => checkedIds.push(cb.dataset.id));
  if (checkedIds.length === 0) {
    batchDeleteMode = false;
    this.innerText = '🗑️ 一键删除';
    document.querySelectorAll('.task-checkbox').forEach(cb => cb.style.display = isAdminUnlocked ? 'none' : 'inline');
    document.querySelectorAll('.delete-btn, .edit-btn-small').forEach(b => b.style.display = 'inline');
    document.querySelectorAll('.add-img-btn-small').forEach(b => b.style.display = 'flex');
    return;
  }
  if (!confirm(`确定要删除选中的 ${checkedIds.length} 个任务吗？`)) return;
  ['card', 'bump', 'home', 'other'].forEach(section => {
    TASKS_CONFIG[section] = TASKS_CONFIG[section].filter(t => !checkedIds.includes(t.id));
  });
  checkedIds.forEach(id => localStorage.removeItem(id));
  batchDeleteMode = false;
  this.innerText = '🗑️ 一键删除';
  refresh();
};

document.getElementById('sync-btn').onclick = function() {
  const status = document.getElementById('sync-status');
  status.style.display = 'inline';
  saveTasksToGist(success => {
    status.style.display = 'none';
    alert(success ? '✅ 同步成功！' : '❌ 同步失败！');
  });
};

document.getElementById('refresh-btn').onclick = () => {
  updateCloudStatus('🔄 从云端刷新中...', false);
  loadTasksFromGist(true, refresh);
};

document.getElementById('export-btn').onclick = () => {
  const sectionNames = { card: '豆瓣卡贴', bump: '豆瓣顶帖', home: '豆瓣咔主页', other: '其余任务' };
  let output = '';
  ['card', 'bump', 'home', 'other'].forEach(section => {
    const tasks = TASKS_CONFIG[section] || [];
    if (tasks.length === 0) return;
    output += `【${sectionNames[section]}】\n`;
    tasks.forEach((task, i) => {
      output += `${i + 1}. ${task.text}${task.link ? ' ' + task.link : ''}\n`;
    });
    output += '\n';
  });
  navigator.clipboard.writeText(output)
    .then(() => alert(`已复制到剪贴板！\n\n${output}`))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = output;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert(`已复制到剪贴板！\n\n${output}`);
    });
};

// 图片预览
function openImagePreview(src) {
  const modal = document.getElementById('image-modal');
  const img = document.getElementById('image-modal-img');
  img.src = src;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeImagePreview() {
  const modal = document.getElementById('image-modal');
  modal.style.display = 'none';
  document.body.style.overflow = '';
}

// 初始化
if (loadTasksFromCache()) refresh();
loadTasksFromGist(true, refresh);
</script>
