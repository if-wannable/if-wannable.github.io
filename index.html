<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投票记录台</title>
  <link rel="stylesheet" href="./styles.css?v=3">
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">票</div>
        <div>
          <div class="brand-title">投票记录台</div>
          <div class="brand-subtitle">Poll Ledger</div>
        </div>
      </div>

      <nav class="tabs" aria-label="视图">
        <button class="tab is-active" type="button" data-view="dashboard" title="总览">
          <span aria-hidden="true">⌁</span>
          <span>总览</span>
        </button>
        <button class="tab" type="button" data-view="data" title="数据">
          <span aria-hidden="true">▦</span>
          <span>数据</span>
        </button>
      </nav>

      <div class="tracker-list" id="trackerList" aria-label="投票列表"></div>
    </aside>

    <main class="workspace">
      <div class="refresh-bar">
        <button id="refreshBtn" class="button secondary compact" type="button">刷新数据</button>
        <span id="refreshStatus" class="status-line"></span>
      </div>

      <section id="dashboardView" class="view is-visible" aria-label="总览">
        <div class="metric-grid">
          <div class="metric">
            <span class="metric-label">参与人数</span>
            <strong id="participantMetric">-</strong>
            <span id="participantDelta" class="metric-foot">暂无变化</span>
          </div>
          <div class="metric">
            <span class="metric-label">记录点</span>
            <strong id="snapshotMetric">-</strong>
            <span id="lastCaptureMetric" class="metric-foot">尚未记录</span>
          </div>
          <div class="metric">
            <span class="metric-label">选项</span>
            <strong id="optionMetric">-</strong>
            <span id="visibilityMetric" class="metric-foot">结果未知</span>
          </div>
          <div class="metric">
            <span class="metric-label">领先项</span>
            <strong id="leaderMetric">-</strong>
            <span id="leaderFoot" class="metric-foot">等待票数</span>
          </div>
        </div>

        <div class="chart-panel">
          <div class="panel-head">
            <h1>参与人数趋势</h1>
            <div class="segmented" role="group" aria-label="图表模式">
              <button class="segment is-active" type="button" data-chart="participants">参与</button>
              <button class="segment" type="button" data-chart="votes">票数</button>
            </div>
          </div>
          <canvas id="trendCanvas" width="980" height="320" aria-label="趋势图"></canvas>
        </div>

        <div class="chart-panel option-trend-panel">
          <div class="panel-head">
            <h1>选项实时票数</h1>
            <div class="status-line" id="optionTrendStatus"></div>
          </div>
          <canvas id="optionVoteCanvas" width="980" height="340" aria-label="每个选项实时票数折线图"></canvas>
          <div class="option-legend" id="optionLegend" aria-label="选项图例"></div>
        </div>

        <div class="chart-panel ranking-panel">
          <div class="panel-head">
            <h1>当前排名</h1>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="status-line" id="rankingStatus">等待票数</div>
              <button id="exportRankingBtn" class="button secondary compact" type="button">导出图片</button>
            </div>
          </div>
          <ol class="ranking-list" id="rankingList" aria-label="选项排名"></ol>
        </div>
      </section>

      <section id="dataView" class="view" aria-label="数据">
        <div class="data-panel">
          <div class="panel-head">
            <h1>日志</h1>
            <div class="status-line" id="rowCount">0 行</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>参与</th>
                  <th>选项</th>
                  <th>票数</th>
                  <th>百分比</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="dataRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=3"></script>
</body>
</html>
