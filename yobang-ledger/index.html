<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>由你榜记录台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="sidebar-header">
        <div class="sidebar-title">由你榜记录台</div>
        <div id="songInfo" class="song-info"></div>
      </div>
      <div class="search-box">
        <div class="url-row">
          <input id="searchInput" type="text" placeholder="搜索歌曲名或输入 uniId…" style="flex:1;min-width:0">
          <button id="searchBtn" class="button" style="min-height:36px;padding:0 10px">搜</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
      <div id="issueList" class="issue-list"></div>
    </aside>

    <div class="workspace">
      <div class="top-actions" style="margin-bottom:14px">
        <span id="lastSync" class="last-sync">等待数据…</span>
        <button id="refreshBtn" class="button">刷新</button>
      </div>

      <div id="metricGrid" class="metric-grid"></div>

      <div class="chart-panel" style="margin-bottom:16px">
        <div class="panel-head">
          <h1>分数趋势</h1>
          <div id="chartModeBar" class="mode-bar"></div>
        </div>
        <div id="dayFilter" class="day-filter-bar"></div>
        <div id="trendStatus" class="status-line"></div>
        <div id="chartScroll">
          <canvas id="trendCanvas"></canvas>
        </div>
        <div id="dimensionLegend" class="dimension-legend"></div>
      </div>

      <div class="data-panel">
        <div class="panel-head">
          <h1>快照记录</h1>
          <span id="rowCount" class="status-line"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="dataRows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
