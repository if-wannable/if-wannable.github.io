<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>由你榜记录台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">榜</div>
        <div>
          <div class="brand-title">由你榜记录台</div>
          <div class="brand-subtitle">Uni Chart Recorder</div>
        </div>
      </div>

      <nav class="tabs" aria-label="视图">
        <button class="tab is-active" type="button" data-view="dashboard">
          <span aria-hidden="true">⌁</span>
          <span>总览</span>
        </button>
        <button class="tab" type="button" data-view="data">
          <span aria-hidden="true">▦</span>
          <span>数据</span>
        </button>
      </nav>

      <div class="tracker-list" id="dayList" aria-label="日期列表"></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topic-meta">
          <span class="field-label">由你榜 · uniId=530004147</span>
          <a class="source-link" href="https://yobang.tencentmusic.com/chart/uni-chart/detail/?uniId=530004147&issue=&chartType=" target="_blank" rel="noopener">原始页面 ↗</a>
        </div>
        <div class="top-actions">
          <span id="lastSync" class="metric-foot">等待首次获取…</span>
          <button id="refreshBtn" class="button secondary" type="button">手动刷新</button>
        </div>
      </header>

      <section id="dashboardView" class="view is-visible" aria-label="总览">
        <div class="metric-grid" id="metricGrid">
          <div class="metric">
            <span class="metric-label">读取中</span>
            <strong>…</strong>
            <span class="metric-foot">等待首次获取</span>
          </div>
        </div>

        <div class="chart-panel">
          <div class="panel-head">
            <h1>各维度分数趋势</h1>
            <div class="status-line" id="trendStatus">读取中…</div>
          </div>
          <canvas id="trendCanvas" width="980" height="360" aria-label="趋势图"></canvas>
          <div class="option-legend" id="dimensionLegend" aria-label="维度图例"></div>
        </div>
      </section>

      <section id="dataView" class="view" aria-label="数据">
        <div class="data-panel">
          <div class="panel-head">
            <h1>快照日志</h1>
            <div class="status-line" id="rowCount">0 行</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr id="tableHead">
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="dataRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
