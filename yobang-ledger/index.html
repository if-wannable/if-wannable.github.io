<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>由你榜记录台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">由你榜记录台</div>
        <div id="songInfo" class="song-info"></div>
      </div>
      <div id="issueList" class="issue-list"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Top bar -->
      <div class="top-actions">
        <span id="lastSync" class="last-sync">等待数据…</span>
        <button id="refreshBtn" class="btn">刷新</button>
      </div>

      <!-- Metric grid -->
      <div id="metricGrid" class="metric-grid"></div>

      <!-- Trend chart -->
      <div class="chart-section">
        <div class="chart-header">
          <span class="section-title">分数趋势</span>
          <div id="chartModeBar" class="mode-bar"></div>
        </div>
        <div id="dayFilter" class="day-filter-bar"></div>
        <div id="trendStatus" class="trend-status"></div>
        <div id="chartScroll" class="chart-scroll">
          <canvas id="trendCanvas"></canvas>
        </div>
        <div id="dimensionLegend" class="dimension-legend"></div>
      </div>

      <!-- Data table -->
      <div class="table-section">
        <div class="table-header">
          <span class="section-title">快照记录</span>
          <span id="rowCount" class="row-count"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead id="tableHead"></thead>
            <tbody id="dataRows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
