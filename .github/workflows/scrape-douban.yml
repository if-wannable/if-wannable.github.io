name: Scrape Douban Poll

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: python scripts/scrape_douban_poll.py

      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: douban-debug-html
          path: douban_debug.html
          retention-days: 7

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add douban_poll_log.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update douban_poll_log.csv ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi
