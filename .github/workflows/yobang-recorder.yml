name: Yobang Recorder

on:
  schedule:
    - cron: '5,15,25,35,45,55 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yobang-recorder
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch and append
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ vars.YOBANG_GIST_ID }}
          UNI_ID: '530004147'
        run: python scripts/fetch_yobang.py
