<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>由你榜记录台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">榜</div>
        <div>
          <div class="brand-title">由你榜记录台</div>
          <div class="brand-subtitle">Uni Chart Recorder</div>
        </div>
      </div>

      <nav class="tabs" aria-label="视图">
        <button class="tab is-active" type="button" data-view="dashboard">
          <span aria-hidden="true">⌁</span>
          <span>总览</span>
        </button>
        <button class="tab" type="button" data-view="data">
          <span aria-hidden="true">▦</span>
          <span>数据</span>
        </button>
        <button class="tab" type="button" data-view="compare">
          <span aria-hidden="true">⊞</span>
          <span>对比</span>
        </button>
      </nav>

      <div class="tracker-list" id="issueList" aria-label="历史榜期"></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topic-meta">
          <label class="field-label" for="songIdInput">歌曲 uniId</label>
          <div class="url-row">
            <input id="songIdInput" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="530004147" value="530004147">
            <button id="loadBtn" class="button" type="button">载入</button>
          </div>
        </div>
        <div class="top-actions">
          <span id="lastSync" class="metric-foot">等待首次获取…</span>
          <button id="shareBtn" class="button secondary" type="button">分享</button>
          <button id="refreshBtn" class="button secondary" type="button">刷新</button>
          <button id="autoFetchBtn" class="button secondary" type="button">定时抓取 ○</button>
        </div>
      </header>

      <section id="dashboardView" class="view is-visible" aria-label="总览">
        <div class="metric-grid" id="metricGrid">
          <div class="metric">
            <span class="metric-label">读取中</span>
            <strong>…</strong>
            <span class="metric-foot">等待首次获取</span>
          </div>
        </div>

        <div class="chart-panel">
          <div class="panel-head">
            <h1>各维度分数趋势</h1>
            <div class="status-line" id="trendStatus">读取中…</div>
          </div>
          <div id="dayFilter"></div>
          <div id="chartScroll">
            <canvas id="trendCanvas" aria-label="趋势图"></canvas>
          </div>
          <div class="option-legend" id="dimensionLegend" aria-label="维度图例"></div>
        </div>

        <div class="chart-panel" id="growthPanel" style="margin-top:14px">
          <div class="panel-head">
            <h1>当日各时段涨幅</h1>
            <div class="status-line">各维度·按小时汇总</div>
          </div>
          <div id="growthDayFilter"></div>
          <div id="growthScroll">
            <canvas id="growthCanvas" aria-label="涨幅图"></canvas>
          </div>
        </div>
      </section>

      <section id="dataView" class="view" aria-label="数据">
        <div class="data-panel">
          <div class="panel-head">
            <h1>快照日志</h1>
            <div class="panel-head-actions">
              <div class="status-line" id="rowCount">0 行</div>
              <button id="exportCsvBtn" class="button secondary" type="button">导出 CSV</button>
              <button id="exportJsonBtn" class="button secondary" type="button">导出 JSON</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr id="tableHead"><th>时间</th></tr>
              </thead>
              <tbody id="dataRows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="compareView" class="view" aria-label="对比">
        <div class="compare-panel">
          <div class="panel-head">
            <h1>多歌曲对比</h1>
            <div class="status-line" id="compareStatus">添加歌曲开始对比</div>
          </div>
          <div class="compare-input-row">
            <input id="compareIdInput" type="text" inputmode="numeric" placeholder="输入 uniId">
            <button id="compareAddBtn" class="button" type="button">添加</button>
          </div>
          <div id="compareGrid" class="compare-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
